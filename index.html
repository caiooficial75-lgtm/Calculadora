<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <script src="script.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-900 p-3 sm:p-4">
    <div class="bg-gray-800 p-4 sm:p-6 rounded-lg shadow-lg w-full max-w-[18rem] sm:max-w-sm md:max-w-md lg:max-w-lg">
        <!-- Visor -->
        <div id="display" class="bg-black text-white text-right p-4 mb-4 rounded text-2xl sm:text-3xl md:text-4xl break-all min-h-[3.5rem]">0</div>

        <!-- teclado -->
        <div class="grid grid-cols-4 gap-2 sm:gap-3">
            <button class="btn text-lg sm:text-xl py-3 sm:py-4">7</button>
            <button class="btn text-lg sm:text-xl py-3 sm:py-4">8</button>
            <button class="btn text-lg sm:text-xl py-3 sm:py-4">9</button>
            <button class="btn text-lg sm:text-xl py-3 sm:py-4">*</button>

            <button class="btn text-lg sm:text-xl py-3 sm:py-4">4</button>
            <button class="btn text-lg sm:text-xl py-3 sm:py-4">5</button>
            <button class="btn text-lg sm:text-xl py-3 sm:py-4">6</button>
            <button class="btn text-lg sm:text-xl py-3 sm:py-4">/</button>

            <button class="btn text-lg sm:text-xl py-3 sm:py-4">1</button>
            <button class="btn text-lg sm:text-xl py-3 sm:py-4">2</button>
            <button class="btn text-lg sm:text-xl py-3 sm:py-4">3</button>
            <button class="btn text-lg sm:text-xl py-3 sm:py-4">-</button>

            <button class="btn text-lg sm:text-xl py-3 sm:py-4">0</button>
            <button class="btn text-lg sm:text-xl py-3 sm:py-4">.</button>
            <button class="btn text-lg sm:text-xl py-3 sm:py-4">=</button>
            <button class="btn text-lg sm:text-xl py-3 sm:py-4">+</button>

            <button class="btn col-span-4 bg-red-500 text-white text-lg sm:text-xl py-3 sm:py-4">C</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
